name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Test
        run: pytest

# ponytail: single Python version + Linux only. Add a matrix (3.10/3.11/3.12,
# ubuntu/macos) once you actually care about a version — `strategy.matrix`
# is one block away. Add mypy / coverage / build-sdist-and-publish when needed.