name: Bug report
description: Something doesn't work the way the docs say it should.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: |
        Include the full error message / traceback, the exact command or
        request you ran, and the response you got.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Python 3.12 on macOS 15, uvicorn from pip"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Smallest set of commands / code that triggers the bug. If it requires
        two agents, paste both sides.
    validations:
      required: false